services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: shortener_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-shortener}
      DB_USERNAME: ${DB_USERNAME:-shortener}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - shortener

  nginx:
    image: nginx:1.27-alpine
    container_name: shortener_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - shortener

  db:
    image: postgres:16-alpine
    container_name: shortener_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-shortener}
      POSTGRES_USER: ${DB_USERNAME:-shortener}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-shortener} -d ${DB_DATABASE:-shortener}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - shortener

  redis:
    image: redis:7-alpine
    container_name: shortener_redis
    restart: unless-stopped
    networks:
      - shortener

volumes:
  pgdata:

networks:
  shortener:
    driver: bridge
